<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0d14">
<title>Top 200 Drug Reference — Quizzes 7–12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700;1,900&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --bg-2: #0e131e;
    --bg-3: #131826;
    --grid: rgba(255, 255, 255, 0.03);
    --text: #ffffff;
    --text-dim: #ffffff;
    --text-faint: rgba(255, 255, 255, 0.45);
    --accent: #ffffff;
    --accent-2: #ffffff;
    --cyan: #ffffff;
    --border: rgba(255, 255, 255, 0.08);
    --border-2: rgba(255, 255, 255, 0.14);
    --row-hover: rgba(255, 255, 255, 0.03);

    /* Per-quiz palette - greyscale in dark mode */
    --q7-color:  #ffffff; --q7-bg:  rgba(255, 255, 255, 0.04); --q7-border:  rgba(255, 255, 255, 0.22);
    --q8-color:  #ffffff; --q8-bg:  rgba(255, 255, 255, 0.04); --q8-border:  rgba(255, 255, 255, 0.22);
    --q9-color:  #ffffff; --q9-bg:  rgba(255, 255, 255, 0.04); --q9-border:  rgba(255, 255, 255, 0.22);
    --q10-color: #ffffff; --q10-bg: rgba(255, 255, 255, 0.04); --q10-border: rgba(255, 255, 255, 0.22);
    --q11-color: #ffffff; --q11-bg: rgba(255, 255, 255, 0.04); --q11-border: rgba(255, 255, 255, 0.22);
    --q12-color: #ffffff; --q12-bg: rgba(255, 255, 255, 0.04); --q12-border: rgba(255, 255, 255, 0.22);
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --bg-2: #ffffff;
    --bg-3: #ffffff;
    --grid: rgba(0, 0, 0, 0.035);
    --text: #000000;
    --text-dim: rgba(0, 0, 0, 0.62);
    --text-faint: rgba(0, 0, 0, 0.42);
    --accent: #000000;
    --accent-2: #000000;
    --cyan: #000000;
    --border: rgba(0, 0, 0, 0.14);
    --border-2: rgba(0, 0, 0, 0.32);
    --row-hover: rgba(0, 0, 0, 0.03);

    --q7-color:  #000000; --q7-bg:  rgba(0, 0, 0, 0.04); --q7-border:  rgba(0, 0, 0, 0.28);
    --q8-color:  #000000; --q8-bg:  rgba(0, 0, 0, 0.04); --q8-border:  rgba(0, 0, 0, 0.28);
    --q9-color:  #000000; --q9-bg:  rgba(0, 0, 0, 0.04); --q9-border:  rgba(0, 0, 0, 0.28);
    --q10-color: #000000; --q10-bg: rgba(0, 0, 0, 0.04); --q10-border: rgba(0, 0, 0, 0.28);
    --q11-color: #000000; --q11-bg: rgba(0, 0, 0, 0.04); --q11-border: rgba(0, 0, 0, 0.28);
    --q12-color: #000000; --q12-bg: rgba(0, 0, 0, 0.04); --q12-border: rgba(0, 0, 0, 0.28);
  }

  [data-theme="light"] body::after {
    background: none;
  }

  [data-theme="light"] mark {
    background: rgba(0, 0, 0, 0.12);
    color: #000000;
  }

  [data-theme="light"] .ind-chip {
    background: rgba(0, 0, 0, 0.04);
    border-color: rgba(0, 0, 0, 0.28);
    color: #000000;
  }

  [data-theme="light"] .drug-card::before {
    background: #000000;
  }

  [data-theme="light"] .search-input:focus {
    background: #ffffff;
    box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { -webkit-text-size-adjust: 100%; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.04) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 18px 24px 80px;
  }

  /* Header */
  .eyebrow {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3.6vw, 30px);
    font-weight: 900;
    line-height: 1.05;
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  h1 .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 900;
  }

  /* Quiz filter chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }

  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .chip:hover, .chip:focus-visible {
    color: var(--text);
    border-color: var(--border-2);
    background: rgba(255, 255, 255, 0.05);
    outline: none;
  }

  .chip.active {
    color: var(--bg);
    background: var(--text);
    border-color: var(--text);
    font-weight: 600;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin: 0 auto 28px;
  }

  .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    pointer-events: none;
    width: 18px;
    height: 18px;
  }

  .search-input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px 18px 54px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px !important;
    font-weight: 500;
    transition: all 0.2s ease;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    /* Prevent iOS auto-zoom on focus */
    -webkit-text-size-adjust: 100%;
    transform: translateZ(0);
  }

  .search-input::placeholder {
    color: var(--text-faint);
    font-style: italic;
    font-weight: 400;
  }

  .search-input:focus {
    border-color: var(--accent-2);
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 0 3px rgba(141, 149, 166, 0.18);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px 0;
  }
  .empty .pill {
    font-size: 56px;
    margin-bottom: 24px;
    display: inline-block;
    transform: rotate(-15deg);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
  }
  .empty p {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.7;
    max-width: 460px;
    margin: 0 auto 6px;
    padding: 0 8px;
  }
  .empty .count {
    margin-top: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 0.04em;
  }

  /* Results meta */
  .results-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 12px;
  }

  /* Compact row list */
  .results {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 22px;
    cursor: pointer;
    transition: background 0.15s ease;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }

  .row:hover, .row:focus-visible {
    background: var(--row-hover);
    outline: none;
  }

  .row-main { flex: 1; min-width: 0; }

  .generic {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .brand {
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    font-style: italic;
    line-height: 1.3;
  }

  .quiz-tag {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
    opacity: 0.85;
  }

  /* Highlight matches */
  mark {
    background: rgba(255, 255, 255, 0.18);
    color: #ffffff;
    padding: 1px 3px;
    border-radius: 2px;
    font-weight: 600;
  }

  /* Back link */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
    transition: color 0.15s ease;
  }
  .back-link:hover { color: var(--text); }

  /* Detail card */
  .drug-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .drug-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(197, 202, 213, 0.5) 18%,
      var(--accent) 50%,
      rgba(197, 202, 213, 0.5) 82%,
      transparent 100%);
    z-index: 2;
  }

  .card-header {
    padding: 32px 36px 26px;
    background: linear-gradient(180deg, rgba(255,255,255,0.012), transparent);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.015em;
    line-height: 1.05;
    margin-bottom: 12px;
  }

  .card-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quiz-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 13px;
    border-radius: 6px;
    border: 1px solid;
    white-space: nowrap;
  }
  .quiz-pill[data-q="Q7"]  { color: var(--q7-color);  background: var(--q7-bg);  border-color: var(--q7-border); }
  .quiz-pill[data-q="Q8"]  { color: var(--q8-color);  background: var(--q8-bg);  border-color: var(--q8-border); }
  .quiz-pill[data-q="Q9"]  { color: var(--q9-color);  background: var(--q9-bg);  border-color: var(--q9-border); }
  .quiz-pill[data-q="Q10"] { color: var(--q10-color); background: var(--q10-bg); border-color: var(--q10-border); }
  .quiz-pill[data-q="Q11"] { color: var(--q11-color); background: var(--q11-bg); border-color: var(--q11-border); }
  .quiz-pill[data-q="Q12"] { color: var(--q12-color); background: var(--q12-bg); border-color: var(--q12-border); }

  .class-pill {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 6px;
    border: 1px solid;
    line-height: 1.3;
  }
  .class-pill[data-q="Q7"]  { color: var(--q7-color);  background: var(--q7-bg);  border-color: var(--q7-border); }
  .class-pill[data-q="Q8"]  { color: var(--q8-color);  background: var(--q8-bg);  border-color: var(--q8-border); }
  .class-pill[data-q="Q9"]  { color: var(--q9-color);  background: var(--q9-bg);  border-color: var(--q9-border); }
  .class-pill[data-q="Q10"] { color: var(--q10-color); background: var(--q10-bg); border-color: var(--q10-border); }
  .class-pill[data-q="Q11"] { color: var(--q11-color); background: var(--q11-bg); border-color: var(--q11-border); }
  .class-pill[data-q="Q12"] { color: var(--q12-color); background: var(--q12-bg); border-color: var(--q12-border); }

  .card-body {
    padding: 28px 36px 32px;
    border-top: 1px solid var(--border);
    display: grid;
    gap: 28px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 36px;
  }

  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.95;
  }

  .ind-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .ind-chip {
    font-size: 13px;
    color: var(--accent);
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(197, 202, 213, 0.06);
    border: 1px solid rgba(197, 202, 213, 0.22);
    line-height: 1.3;
    font-weight: 500;
  }

  .bullet-list {
    list-style: none;
    display: grid;
    gap: 10px;
  }

  .bullet-row {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 10px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    font-weight: 600;
  }

  .bullet-row .dash {
    color: var(--text-faint);
    user-select: none;
    font-weight: 400;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 15px;
  }
  .no-results .x {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 36px;
    color: var(--text-faint);
    margin-bottom: 12px;
  }


  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 38px;
    height: 38px;
    border-radius: 999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    z-index: 10;
  }
  .theme-toggle:hover {
    color: var(--text);
    border-color: var(--border-2);
  }
  .theme-toggle svg {
    width: 16px;
    height: 16px;
  }
  .theme-toggle .icon-light { display: none; }
  .theme-toggle .icon-dark  { display: block; }
  [data-theme="light"] .theme-toggle .icon-light { display: block; }
  [data-theme="light"] .theme-toggle .icon-dark  { display: none; }

  /* Mobile */
  @media (max-width: 720px) {
    .wrap { padding: 14px 14px 72px; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    .eyebrow { font-size: 9.5px; letter-spacing: 0.24em; margin-bottom: 6px; }
    .subtitle { font-size: 14px; margin-bottom: 28px; }

    .chips { gap: 6px; margin-bottom: 12px; }
    .chip { padding: 7px 12px; font-size: 11px; }

    .search-input { padding: 15px 16px 15px 46px; font-size: 16px; border-radius: 12px; }
    .search-icon { left: 16px; width: 16px; height: 16px; }

    .row { padding: 16px 18px; gap: 12px; }
    .generic { font-size: 15px; }
    .brand { font-size: 14px; }
    .quiz-tag { font-size: 10.5px; }

    .empty .pill { font-size: 48px; }
    .empty p { font-size: 14px; }

    /* Detail card mobile */
    .card-header { padding: 24px 22px 20px; }
    .card-title { font-size: 30px; }
    .card-brand { font-size: 16px; margin-bottom: 14px; }
    .quiz-pill { font-size: 10px; padding: 6px 11px; letter-spacing: 0.06em; }
    .class-pill { font-size: 11.5px; padding: 6px 11px; }

    .card-body { padding: 22px 22px 26px; gap: 24px; }
    .field-grid { grid-template-columns: 1fr; gap: 24px; }
    .field-label { font-size: 10px; letter-spacing: 0.16em; margin-bottom: 12px; }
    .bullet-row { font-size: 13.5px; line-height: 1.55; }
    .ind-chip { font-size: 12.5px; padding: 7px 12px; }
  }

  @media (max-width: 380px) {
    .wrap { padding: 12px 10px 64px; }
    h1 { font-size: 21px; }
    .row { padding: 14px 14px; }
    .chip { padding: 6px 11px; font-size: 10.5px; }
    .card-header { padding: 22px 18px 18px; }
    .card-body { padding: 20px 18px 24px; }
    .card-title { font-size: 26px; }
  }
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
  <svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
  <svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2"></path><path d="M12 20v2"></path>
    <path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path>
    <path d="M2 12h2"></path><path d="M20 12h2"></path>
    <path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>
  </svg>
</button>

<div class="wrap">
  <div class="eyebrow">Dispensing &amp; Patient Care II</div>
  <h1>Top 200 <span class="accent">Drug</span> Reference</h1>
  
  <div class="chips" id="chips">
    <button class="chip active" data-quiz="ALL">All Quizzes</button>
    <button class="chip" data-quiz="Q7">Q7 — Asthma</button>
    <button class="chip" data-quiz="Q8">Q8 — GI</button>
    <button class="chip" data-quiz="Q9">Q9 — GU</button>
    <button class="chip" data-quiz="Q10">Q10 — Pain</button>
    <button class="chip" data-quiz="Q11">Q11 — Endocrine</button>
    <button class="chip" data-quiz="Q12">Q12 — Cardio</button>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <input type="text" class="search-input" id="search" placeholder="e.g. Furosemide or Lasix..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>

  <div id="content"></div>

const QUIZ_LABELS = {
  Q7: 'Q7 — Asthma & Allergy',
  Q8: 'Q8 — GI & Ophthalmics',
  Q9: 'Q9 — GU & Hormones',
  Q10: 'Q10 — Pain Management',
  Q11: 'Q11 — Endocrine',
  Q12: 'Q12 — Cardio Pt. 2',
};

let activeQuiz = 'ALL';
let activeQuery = '';
let expandedKey = null;

const $search = document.getElementById('search');
const $content = document.getElementById('content');
const $chips = document.getElementById('chips');

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, query) {
  const safe = escapeHTML(text);
  if (!query) return safe;
  const q = query.trim();
  if (!q) return safe;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('\\b(' + escaped + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function splitLines(s) {
  return String(s || '').split('\n').map(x => x.trim()).filter(Boolean);
}

function bulletList(text) {
  const lines = splitLines(text);
  if (!lines.length) return '<div class="bullet-row"><span class="dash">—</span><span>—</span></div>';
  return `<ul class="bullet-list">` + lines.map(l =>
    `<li class="bullet-row"><span class="dash">—</span><span>${escapeHTML(l)}</span></li>`
  ).join('') + `</ul>`;
}

function indicationChips(text) {
  const lines = splitLines(text);
  if (!lines.length) return '<div class="bullet-row"><span class="dash">—</span><span>—</span></div>';
  return `<div class="ind-chips">` + lines.map(l =>
    `<span class="ind-chip">${escapeHTML(l)}</span>`
  ).join('') + `</div>`;
}

function filterDrugs() {
  const q = activeQuery.trim();
  let list = DRUGS.filter(d => {
    if (activeQuiz !== 'ALL' && d.quiz !== activeQuiz) return false;
    if (!q) return true;
    // Match start of any word in generic or brand only (not class)
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('\\b' + escaped, 'i');
    return re.test(d.generic) || re.test(d.brand);
  });
  if (q) {
    const ql = q.toLowerCase();
    // Sort: generic starts with query (rank 0) > brand starts with query (rank 1) > other (rank 2)
    list.sort((a, b) => {
      const rank = (d) => {
        if (d.generic.toLowerCase().startsWith(ql)) return 0;
        if (d.brand.toLowerCase().split(/[\s\/,]+/).some(w => w.toLowerCase().startsWith(ql))) return 1;
        return 2;
      };
      const ra = rank(a), rb = rank(b);
      if (ra !== rb) return ra - rb;
      return a.generic.localeCompare(b.generic);
    });
  }
  return list;
}

function renderEmpty() {
  const total = activeQuiz === 'ALL' ? DRUGS.length : DRUGS.filter(d => d.quiz === activeQuiz).length;
  const quizzesShown = activeQuiz === 'ALL' ? 6 : 1;
  return `
    <div class="empty">
      <p>Search for any drug above to view its complete profile.</p>
      <p>Works with generic <em>and</em> brand names.</p>
      <div class="count">${total} drugs across ${quizzesShown} ${quizzesShown === 1 ? 'quiz' : 'quizzes'}</div>
    </div>
  `;
}

function renderRow(d) {
  const key = `${d.quiz}-${d.num}`;
  const q = activeQuery;
  return `
    <div class="row" data-key="${key}" tabindex="0" role="button" aria-label="View details for ${escapeHTML(d.generic)}">
      <div class="row-main">
        <div class="generic">${highlight(d.generic, q)}</div>
        <div class="brand">${highlight(d.brand, q)}</div>
      </div>
      <div class="quiz-tag">${d.quizLabel}</div>
    </div>
  `;
}

function renderDetailCard(d) {
  // Brand: if joined by " / ", show as comma-separated for readability
  const brandDisplay = d.brand.replace(/\s*\/\s*/g, ', ');

  return `
    <button class="back-link" id="back-link" aria-label="Back to list">← Back to results</button>
    <article class="drug-card">
      <header class="card-header">
        <h2 class="card-title">${escapeHTML(d.generic)}</h2>
        <div class="card-brand">${escapeHTML(brandDisplay)}</div>
        <div class="card-tags">
          <span class="class-pill" data-q="${d.quiz}">${escapeHTML(d.drugClass.replace(/\n/g, ' · '))}</span>
          <span class="quiz-pill" data-q="${d.quiz}">${escapeHTML(d.quizDetail)}</span>
        </div>
      </header>
      <div class="card-body">
        <div class="field">
          <div class="field-label">FDA Indications</div>
          ${indicationChips(d.indications)}
        </div>
        <div class="field-grid">
          <div class="field">
            <div class="field-label">Typical Dosing</div>
            ${bulletList(d.dosing)}
          </div>
          <div class="field">
            <div class="field-label">Adverse Effects</div>
            ${bulletList(d.adverse)}
          </div>
        </div>
        <div class="field">
          <div class="field-label">Key Counseling Points</div>
          ${bulletList(d.counseling)}
        </div>
      </div>
    </article>
  `;
}

function render() {
  const showEmptyState = !activeQuery && activeQuiz === 'ALL' && !expandedKey;

  if (showEmptyState) {
    $content.innerHTML = renderEmpty();
    return;
  }

  if (expandedKey) {
    const drug = DRUGS.find(d => `${d.quiz}-${d.num}` === expandedKey);
    if (drug) {
      $content.innerHTML = renderDetailCard(drug);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    } else {
      expandedKey = null;
    }
  }

  const list = filterDrugs();
  if (list.length === 0) {
    $content.innerHTML = `
      <div class="no-results">
        <div class="x">×</div>
        <div>No drugs match your search.</div>
      </div>
    `;
    return;
  }

  const meta = `<div class="results-meta">${list.length} ${list.length === 1 ? 'result' : 'results'}${activeQuiz !== 'ALL' ? ' in ' + QUIZ_LABELS[activeQuiz] : ''}</div>`;
  $content.innerHTML = meta + '<div class="results">' + list.map(renderRow).join('') + '</div>';
}

$search.addEventListener('input', e => {
  activeQuery = e.target.value;
  expandedKey = null;
  render();
});

$search.addEventListener('focus', e => {
  setTimeout(() => e.target.select(), 0);
});
$search.addEventListener('click', e => {
  e.target.select();
});

$chips.addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeQuiz = btn.dataset.quiz;
  expandedKey = null;
  render();
});

$content.addEventListener('click', e => {
  if (e.target.closest('#back-link')) {
    expandedKey = null;
    render();
    return;
  }
  const row = e.target.closest('.row');
  if (!row) return;
  expandedKey = row.dataset.key;
  render();
});

$content.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const row = e.target.closest('.row');
  if (!row) return;
  e.preventDefault();
  expandedKey = row.dataset.key;
  render();
});

// Browser back button collapses detail view
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && expandedKey) {
    expandedKey = null;
    render();
  }
});


// Theme toggle
const $themeToggle = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('drugref-theme');
const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
const initialTheme = savedTheme || (systemPrefersLight ? 'light' : 'dark');
if (initialTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');

$themeToggle.addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('drugref-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('drugref-theme', 'light');
  }
});

render();
</script>
</body>
</html>
